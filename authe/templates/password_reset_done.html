{% extends "base.html" %}

{% block title %}Password Reset Link Sent{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card p-4 text-center" style="max-width: 500px; width: 100%;">
    <div class="card-body">
      <h4 class="card-title mb-3">✅ Password Reset Link Sent</h4>
      <p class="card-text">If an account with that email exists, we've sent you a password reset link. Check your inbox!</p>
      <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
