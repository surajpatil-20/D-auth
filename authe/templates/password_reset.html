{% extends "base.html" %}

{% block title %}Forgot password {% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card p-4" style="max-width: 400px; width: 100%;">
    <div class="card-body">
      <h2 class="card-title text-center mb-4">Forgot Password</h2>
      <form method="POST" action="{% url 'password_reset' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label for="{{ form.email.id_for_label }}" class="form-label">Email:</label>
          <input type="email" name="{{ form.email.name }}" class="form-control" maxlength="150" placeholder="Enter your Registered Email" required>
          <div class="text-danger">{{ form.email.errors }}</div>
        </div>
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary">Send Reset Password Link</button>
        </div>
        <div class="text-center">
          <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
