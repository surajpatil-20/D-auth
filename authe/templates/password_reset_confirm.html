{% extends "base.html" %}

{% block title %}confirm new Password{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card p-4" style="max-width: 400px; width: 100%;">
    <div class="card-body">
      <h2 class="card-title text-center mb-4">Set New Password</h2>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label for="{{ form.new_password1.id_for_label }}" class="form-label">New Password:</label>
          <input type="password" name="{{ form.new_password1.name }}" class="form-control" maxlength="150" placeholder="Enter New Password" required>
          <div class="text-danger">{{ form.new_password1.errors }}</div>
        </div>
        <div class="mb-3">
          <label for="{{ form.new_password2.id_for_label }}" class="form-label">Confirm Password:</label>
          <input type="password" name="{{ form.new_password2.name }}" class="form-control" maxlength="150" placeholder="Re-enter Password" required>
          <div class="text-danger">{{ form.new_password2.errors }}</div>
        </div>
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary">Set New Password</button>
        </div>
        <div class="text-center">
          <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
